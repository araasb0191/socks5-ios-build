name: build-dylib

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Compile dylib
        run: |
          clang -dynamiclib socks5_force_crash_auth.c \
          -o libsocks5.dylib \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: libsocks5
          path: libsocks5.dylib
