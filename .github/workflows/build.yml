name: build-dylib
on: push
jobs:
  build:
      runs-on: macos-latest
          steps:
                - name: Checkout
                        uses: actions/checkout@v3
                              - name: Compile
                                      run: clang -dynamiclib socks5_force_crash_auth.c -o libsocks5.dylib -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -arch arm64
                                            - name: Upload
                                                    uses: actions/upload-artifact@v4
                                                            with:
                                                                      name: libsocks5
                                                                                path: libsocks5.dylib
                                                                                
